<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cal-FX Guitar Pedal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cal-FX</h1>
            <p>Low-Latency Guitar Effects</p>
        </header>

        <section class="device-settings">
            <div class="control-group">
                <label for="input-select">Input (Mic/Instrument):</label>
                <select id="input-select">
                    <option value="test-wave">Test Wave (440Hz)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="output-select">Output (Speakers/Headphones):</label>
                <select id="output-select"></select>
            </div>
            <div class="actions">
                <button id="start-btn">Start Audio</button>
                <button id="mute-btn" disabled>Mute Audio</button>
            </div>
        </section>

        <main id="pedalboard" class="disabled">
            <div class="pedal theremin-pedal">
                <div class="pedal-label">THEREMIN</div>
                
                <div class="knobs">
                    <div class="knob-container">
                        <label>SENS</label>
                        <input type="range" id="theremin-sens" min="0" max="1" step="0.01" value="0.5">
                    </div>
                    <div class="knob-container">
                        <label>GLIDE</label>
                        <input type="range" id="theremin-glide" min="0" max="0.5" step="0.01" value="0.1">
                    </div>
                </div>

                <div class="foot-switch-container">
                    <div id="theremin-led" class="led"></div>
                    <button id="theremin-bypass-btn" class="foot-switch"></button>
                    <span>BYPASS</span>
                </div>
            </div>

            <div class="pedal octave-pedal">
                <div class="pedal-label">OCTAVE</div>
                
                <div class="knobs">
                    <div class="knob-container">
                        <label>-2 OCT</label>
                        <input type="range" id="octave-m2" min="0" max="1" step="0.01" value="0">
                    </div>
                    <div class="knob-container">
                        <label>-1 OCT</label>
                        <input type="range" id="octave-m1" min="0" max="1" step="0.01" value="0">
                    </div>
                    <div class="knob-container">
                        <label>DRY (0)</label>
                        <input type="range" id="octave-0" min="0" max="1" step="0.01" value="1">
                    </div>
                    <div class="knob-container">
                        <label>+1 OCT</label>
                        <input type="range" id="octave-p1" min="0" max="1" step="0.01" value="0">
                    </div>
                    <div class="knob-container">
                        <label>+2 OCT</label>
                        <input type="range" id="octave-p2" min="0" max="1" step="0.01" value="0">
                    </div>
                </div>

                <div class="foot-switch-container">
                    <div id="octave-led" class="led"></div>
                    <button id="octave-bypass-btn" class="foot-switch"></button>
                    <span>BYPASS</span>
                </div>
            </div>

            <div class="pedal fuzz-pedal">
                <div class="pedal-label">FUZZ</div>
                
                <div class="knobs">
                    <div class="knob-container">
                        <label>DRIVE</label>
                        <input type="range" id="fuzz-drive" min="0" max="1" step="0.01" value="0.5">
                    </div>
                    <div class="knob-container">
                        <label>VOLUME</label>
                        <input type="range" id="fuzz-volume" min="0" max="1" step="0.01" value="0.5">
                    </div>
                </div>

                <div class="foot-switch-container">
                    <div id="fuzz-led" class="led"></div>
                    <button id="fuzz-bypass-btn" class="foot-switch"></button>
                    <span>BYPASS</span>
                </div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/tone"></script>
    <script src="fx.js"></script>
</body>
</html>
